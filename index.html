<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon-bpirsc.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPIR Student Council</title>
  </head>
  <body>
    <div id="root">
      <style>
        body {
          margin: 0;
          background-color: #05070c;
        }
        .app-loading-screen {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          width: 100vw;
          background-color: #05070c;
          font-family: system-ui, -apple-system, sans-serif;
        }
        .app-loading-spinner {
          width: 48px;
          height: 48px;
          border: 3px solid rgba(16, 185, 129, 0.1);
          border-radius: 50%;
          border-top-color: #10b981;
          animation: spin 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite;
        }
        .app-loading-text {
          margin-top: 24px;
          color: #94a3b8;
          font-size: 14px;
          font-weight: 500;
          letter-spacing: 0.1em;
          animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        @keyframes pulse {
          0%, 100% { opacity: 0.5; }
          50% { opacity: 1; }
        }
      </style>
      <div class="app-loading-screen">
        <div class="app-loading-spinner"></div>
        <div class="app-loading-text">LOADING PORTAL...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
